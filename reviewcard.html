<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviewCard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Georgian:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone">
  <div class="brandmark"><div class="monogram" aria-hidden="true">R</div><span>ReviewCard</span></div>
  <div class="logo-frame" id="logoFrame" style="display:none;">
    <img id="bizLogo" alt="">
  </div>
  <p class="biz-name" id="bizName">იტვირთება...</p>

  <div class="stage" id="stageRating" style="display:none;">
    <div class="progress" aria-label="Step 1 of 2">
      <span class="progress-text">Step 1 of 2</span>
      <span class="progress-track"><span class="progress-segment active"></span><span class="progress-segment"></span></span>
    </div>
    <p class="prompt-ka">როგორ შეაფასებდით გამოცდილებას?</p>
    <div class="experience-actions" aria-label="Choose your experience">
      <button class="experience-btn positive" id="goodExperienceBtn" type="button">
        <span class="thumb-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3m0 11V10l5-8 1.8 1.2a3 3 0 0 1 1.1 3.4L14 11h5.4a2 2 0 0 1 2 2.3l-1 6.5A2.6 2.6 0 0 1 17.8 22H7Z"/></svg>
        </span>
        <span>
          <strong>დადებითად</strong>
        </span>
      </button>
      <button class="experience-btn negative" id="badExperienceBtn" type="button">
        <span class="thumb-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M7 2H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h3m0-11v12l5 8 1.8-1.2a3 3 0 0 0 1.1-3.4L14 13h5.4a2 2 0 0 0 2-2.3l-1-6.5A2.6 2.6 0 0 0 17.8 2H7Z"/></svg>
        </span>
        <span>
          <strong>უარყოფითად</strong>
        </span>
      </button>
    </div>
  </div>

  <div class="stage" id="stageGoogle" style="display:none;">
    <div class="progress compact" aria-label="Step 2 of 2"><span class="progress-text">Step 2 of 2</span><span class="progress-track"><span class="progress-segment active"></span><span class="progress-segment active"></span></span></div>
    <div class="spinner"></div>
    <p class="prompt-ka">მადლობა!</p>
    <p class="prompt-ka">გთხოვთ შეგვაფასოთ გუგლზეც</p>
  </div>

  <div class="stage" id="stageFeedback" style="display:none;">
    <div class="progress" aria-label="Step 2 of 2"><span class="progress-text">Step 2 of 2</span><span class="progress-track"><span class="progress-segment active"></span><span class="progress-segment active"></span></span></div>
    <p class="prompt-ka">რა გავაუმჯობესოთ?</p>
    <textarea id="feedbackText" placeholder="დაწერეთ აქ..."></textarea>
    <button class="primary-btn" id="sendFeedbackBtn">გაგზავნა</button>
    <button class="tiny-link" id="alsoGoogle">Prefer Google? Leave a review there instead</button>
  </div>

  <div class="stage" id="stageThanks" style="display:none;">
    <div class="progress compact" aria-label="Complete"><span class="progress-text">Complete</span><span class="progress-track"><span class="progress-segment active"></span><span class="progress-segment active"></span></span></div>
    <div class="seal"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
    <p class="prompt-ka" style="margin-bottom:6px;">მადლობა!</p>
  </div>

  <div class="stage" id="stageError" style="display:none;">
    <p class="error-box">ამ გვერდის ჩატვირთვისას რაღაც შეცდომა დაფიქსირდა.<br>გთხოვთ, ხელახლა სცადოთ ბარათზე შეხება.</p>
  </div>

  <p class="footer-note"><span class="powered-by-text">Powered by</span><img class="footer-logo" src="images/logo.png" alt="ReviewCard logo"></p>
</div>

<script src="script.js"></script>
</body>
</html>
